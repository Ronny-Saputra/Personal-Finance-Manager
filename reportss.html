<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Reports</title>
  <link rel="stylesheet" href="reportss.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="sidebar">
    <div class="welcome-message">Welcome, Darren</div>
    <div class="sidebar-menu">
      <a href="dashboard.html" class="menu-item">
        <img src="Logos/dashboard_logo.png" alt="Dashboard">
        <span>Dashboard</span>
      </a>
      <a href="income.html" class="menu-item">
        <img src="Logos/expenses_logo.png" alt="Expenses">
        <span>Expenses and Income</span>
      </a>
      <a href="transactions.html" class="menu-item">
        <img src="Logos/transactions_logo.png" alt="Transactions">
        <span>Transactions</span>
      </a>
      <a href="reportss.html" class="menu-item active">
        <img src="Logos/reports_logo.png" alt="Reports">
        <span>Monthly Reports</span>
      </a>
      <a href="target.html" class="menu-item">
        <img src="Logos/monthly_logo.png" alt="Savings">
        <span>Monthly Savings Target</span>
      </a>
      <a href="add.html" class="menu-item">
        <img src="Logos/adding_logo.png" alt="Add">
        <span>Add Income and Expenses</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="menu-item" id="logout-button">
        <img src="Logos/logout_logo.png" alt="Logout">
        <span>Logout</span>
      </div>
    </div>
  </div>
  
  <div class="main-content">
    <div class="welcome-header">
      <div class="header-with-selector">
        <h2>Monthly Expense Overview</h2>
        <div class="month-selector">
          <label for="month-select">Select Month:</label>
          <select id="month-select">
            <option value="January">January 2025</option>
            <option value="February">February 2025</option>
            <option value="March">March 2025</option>
            <!-- Add more months as needed -->
          </select>
        </div>
      </div>
    </div>
  
    <!-- Chart -->
    <div class="chart-container">
      <canvas id="expensesChart"></canvas>
    </div>
  
    <!-- Expense Breakdown and Summary -->
    <div class="data-section">
      <div class="data-card expense-breakdown">
        <h3>Expense Breakdown</h3>
        <table class="data-table" id="expense-breakdown-table">
          <thead>
            <tr>
              <th>Category</th>
              <th>Budget</th>
              <th>Expense</th>
              <th>+/−</th>
            </tr>
          </thead>
          <tbody>
            <!-- Data rows will be dynamically added here -->
          </tbody>
        </table>
      </div>
  
      <div class="data-card summary">
        <h3>Summary</h3>
        <table class="data-table" id="summary-table">
          <tr>
            <td>Budgeted Amount</td>
            <td id="budgeted-amount">Rp 45,150,000</td>
          </tr>
          <tr>
            <td>Amount Spent</td>
            <td id="amount-spent">Rp 24,320,000</td>
          </tr>
          <tr class="total-row">
            <td>Exceeded</td>
            <td id="exceeded-amount">Rp 170,000</td>
          </tr>
        </table>
      </div>
    </div>
  </div>
  </div>

  <script src="reportss.js"></script>
</body>
</html>
